# =========================
# UI / Frontend Noise Control
# =========================
ui:
  # 是否把“路由到哪个case/命令行/调试信息”等发到前端；建议 false（只写日志）
  verbose: false

  # 是否发送 progress payload（前端要流程条就 true，不要就 false）
  progress: true

  # progress 里是否显示 icon（你嫌卡通图标太多就 false）
  show_icons: false

  # 是否把 summary.md 原文发到前端（工业平台一般不直接刷一大段 md）
  send_summary_md: false

  # 前端提示语风格：minimal/normal（你后面想做多档文案可以用）
  tone: "minimal"

  # 文本输出上限（防止 summary.md / LLM 一次性喷太多）
  max_text_chars: 6000

case_name: phone_drop
case_id: phone_drop_pinn   
version: 1.0               
title: 手机跌落 PINN 应力场案例
description: >
  使用 2D PINN 模型模拟手机从空中跌落到刚性地面时的等效 von Mises 应力场，
  包含多材料分区（摄像头、电池、金属边框）与底部冲击体力。

physics:
  Lx: 0.070          # m, 手机宽度
  Ly: 0.140          # m, 手机高度
  T_final: 0.020     # s, 模拟时间窗口
  E_phys0: 7.0e10    # Pa, 参考弹性模量
  rho_phys0: 2700.0  # kg/m^3, 参考密度
  nu: 0.30           # 泊松比

materials:
  base:
    E_star: 1.0
    rho_star: 1.0
  camera:
    E_factor: 1.4
    rho_factor: 1.15
    region_mm:
      x0: -7.5
      x1: 7.5
      y0: 115.0
      y1: 140.0
  battery:
    E_factor: 0.7
    rho_factor: 1.4
    region_mm:
      x0: -15.0
      x1: 15.0
      y0: 60.0
      y1: 100.0
  side_frame:
    E_factor: 1.3
    rho_factor: 1.1
    left_x0_mm: -35.0
    left_x1_mm: -30.0
    right_x0_mm: 30.0
    right_x1_mm: 35.0
    y0_mm: 0.0
    y1_mm: 140.0

impact:
  use_time_envelope: true
  use_body_force: true
  body_force_peak: 40.0
  pulse_t0: 0.0015      # s
  pulse_tau: 0.0005     # s
  bottom_focus_y: 0.01  # m, 底部强化采样与冲击区域厚度
  bottom_focus_ratio: 0.5

initial_condition:
  v0_y: -2.0            # 初始向下速度（无量纲内部直接用）

training:
  epochs_quick: 2000
  epochs_full: 7600
  lr: 1.0e-3
  N_pde: 20000
  N_ic: 4000
  N_bc: 4000
  ic_weight: 1.0
  bc_weight: 1.0
  scheduler_step: 2000
  scheduler_gamma: 0.5

model:
  in_dim: 3
  out_dim: 2
  width: 64
  depth: 5
  use_symmetry: false

visualization:
  grid_nx: 120
  grid_ny: 240
  triptych_ms: [0.25, 1.0, 5.0]
  gif_ms:
    start: 0.25
    end: 7.5
    step: 0.25
  t_min_search_ms: 0.5       # 自动搜索 bottom/top 对比度时的最小 t
